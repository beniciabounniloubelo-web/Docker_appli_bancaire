secrets:
  db_password:
    file: ./db_password.txt
  db_user:
    file: ./db_user.txt
  db_name:
    file: ./db_name.txt

services:
  db:
    image: postgres:15-alpine
    container_name: banque
    restart: unless-stopped
    secrets:
      - db_password
      - db_user
      - db_name
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "arwa", "-d", "banque"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: back_container
    secrets:
      - db_password
      - db_user
      - db_name
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net

  frontend:
    build: ./frontend
    container_name: front_container
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend-net

  interest:
    build:
      context: ./interest_service
    container_name: interest_container
    command: python interest.py
    secrets:
      - db_password
      - db_user
      - db_name
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net

networks:
  frontend-net:
  backend-net:
    internal: true

volumes:
  db-data: